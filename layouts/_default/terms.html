{{ define "main" }}
  <section class="page-hero">
    <p class="eyebrow">Browse</p>
    <h1>{{ .Title }}</h1>
    <p class="intro">Use tags to move through the archive by material, mood, room type, region, or idea.</p>
  </section>

  <section class="archive-section">
    <div class="tag-cloud large">
      {{ range .Data.Terms.Alphabetical }}
        <a href="{{ .Page.RelPermalink }}">#{{ .Page.Title }} <span>{{ .Count }}</span></a>
      {{ end }}
    </div>
  </section>
{{ end }}
